name: Accessibility Check

# This workflow demonstrates A11yInspect CLI usage in GitHub Actions
# Configured to show ALL results including passes (Enterprise feature)
#
# LICENSE KEY OPTIONS:
# 1. Production: Use repository secret (recommended)
#    - Go to Settings > Secrets > Actions
#    - Add secret: A11YINSPECT_LICENSE_KEY = your-enterprise-key
#
# 2. Demo/Testing: Use test bypass key (for demos only, not for production)
#    - Replace ${{ secrets.A11YINSPECT_LICENSE_KEY }} with: a11yEnt
#    - Available bypass keys: a11yPro (Pro tier), a11yEnt (Enterprise tier)
#    - WARNING: This is for testing purposes only. Use real keys in production.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write

jobs:
  a11y-static:
    name: Static Accessibility Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout test-app
        uses: actions/checkout@v4

      - name: Checkout A11yInspect
        uses: actions/checkout@v4
        with:
          repository: BarrierBreak/vscode-scally
          path: .a11yinspect
          ref: ai-upgrade
          token: ${{ secrets.VSCODE_SCALLY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build A11yInspect CLI
        run: |
          cd .a11yinspect
          npm install
          npm run compile
          cp -r runner out/cli/runner

      - name: Run A11yInspect (SARIF)
        run: |
          node .a11yinspect/out/cli/index.js \
            --format=sarif \
            --output=a11y-report.sarif \
            --severity=pass \
            --fail-on=error \
            --github-grouped \
            --github-annotations \
            "src/**/*.{html,jsx,js,tsx}"
        env:
          GITHUB_TOKEN: ${{ secrets.VSCODE_SCALLY }}
          # For demo/testing: Using bypass key (enabled by default)
          A11YINSPECT_LICENSE_KEY: a11yEnt
          # For production: Comment out the line above and uncomment the line below
          # A11YINSPECT_LICENSE_KEY: ${{ secrets.A11YINSPECT_LICENSE_KEY }}

      - name: Run A11yInspect (JSON)
        if: always()
        run: |
          node .a11yinspect/out/cli/index.js \
            --format=json \
            --output=a11y-report.json \
            --severity=pass \
            --fail-on=none \
            "src/**/*.{html,jsx,js,tsx}"
        env:
          # For demo/testing: Using bypass key (enabled by default)
          A11YINSPECT_LICENSE_KEY: a11yEnt
          # For production: Comment out the line above and uncomment the line below
          # A11YINSPECT_LICENSE_KEY: ${{ secrets.A11YINSPECT_LICENSE_KEY }}

      - name: Run A11yInspect (HTML)
        if: always()
        run: |
          node .a11yinspect/out/cli/index.js \
            --format=html \
            --output=a11y-report.html \
            --severity=pass \
            --fail-on=none \
            "src/**/*.{html,jsx,js,tsx}"
        env:
          # For demo/testing: Using bypass key (enabled by default)
          A11YINSPECT_LICENSE_KEY: a11yEnt
          # For production: Comment out the line above and uncomment the line below
          # A11YINSPECT_LICENSE_KEY: ${{ secrets.A11YINSPECT_LICENSE_KEY }}

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: a11y-report.sarif

      - name: Upload Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-reports
          path: |
            a11y-report.sarif
            a11y-report.json
            a11y-report.html
          retention-days: 30
